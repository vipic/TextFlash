name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15

    steps:
      - name: Check
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Check shell scripts
        run: |
          bash -n deploy.sh
          bash -n release.sh
          bash -n scripts/next_version.sh
          bash -n .mise/tasks/release
          bash -n .mise/tasks/release-auto
          bash -n .mise/tasks/publish

      - name: Run tests
        run: swift test -Xswiftc -DDISABLE_PREVIEWS

      - name: Build release
        run: swift build -c release -Xswiftc -Osize -Xswiftc -DDISABLE_PREVIEWS
