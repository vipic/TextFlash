name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15

    steps:
      - name: Check
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Check shell scripts
        run: bash -n deploy.sh release.sh

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
